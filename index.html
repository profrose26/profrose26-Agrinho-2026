<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agro Forte - Futuro Sustentável</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🌾 Agro Forte, Futuro Sustentável 🌱</h1>

<p>
Tome decisões para aumentar a produção agrícola sem prejudicar o meio ambiente.
</p>

<div class="placar">
    <p>Produção: <span id="producao">50</span></p>
    <p>Sustentabilidade: <span id="sustentabilidade">50</span></p>
</div>

<div id="pergunta">
    Como você deseja irrigar a plantação?
</div>

<div class="botoes">
    <button onclick="escolhaGotejamento()">
        Irrigação por Gotejamento
    </button>

    <button onclick="escolhaConvencional()">
        Irrigação Convencional
    </button>
</div>

<div id="resultado"></div>

</div>

<script src="script.js"></script>
</body>
</html>
